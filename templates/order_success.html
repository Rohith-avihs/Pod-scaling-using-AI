{% extends "base.html" %}
{% block title %}Order Placed — ShopEase{% endblock %}

{% block content %}
<div style="text-align:center; padding: 5rem 2rem;">
    <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem;">
        <div style="width: 72px; height: 72px; border-radius: 50%; border: 3px solid var(--accent); display: flex; align-items: center; justify-content: center;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
    </div>
    <h1 style="font-family:'Playfair Display',serif; font-size:2.5rem; margin-bottom:1rem;">Order Placed!</h1>
    <p style="color:var(--muted); font-size:1.1rem; margin-bottom:2rem;">Thank you for your purchase. Your order is being processed.</p>
    <a href="/" class="btn btn-primary" style="font-size:1rem; padding:0.8rem 2rem;">Continue Shopping</a>
</div>
{% endblock %}
