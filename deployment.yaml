apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopease
spec:
  replicas: 2

  selector:
    matchLabels:
      app: shopease

  template:
    metadata:
      labels:
        app: shopease

    spec:
      containers:
      - name: shopease
        image: shopease:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 5000
